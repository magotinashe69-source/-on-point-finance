<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}On Point Finance{% endblock %}</title>
  <style>
    :root { --navy: #16264d; --gold: #c9a227; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
           color: #1d2433; background: #f4f6fa; }
    header { background: var(--navy); color: #fff; padding: 16px 24px;
             display: flex; align-items: center; gap: 14px; }
    .badge { width: 44px; height: 44px; border-radius: 10px; background: var(--gold);
             color: var(--navy); display: flex; align-items: center; justify-content: center;
             font-weight: 700; font-size: 18px; }
    header .sub { color: var(--gold); font-size: 13px; }
    main { max-width: 760px; margin: 28px auto; padding: 0 20px; }
    .card { background: #fff; border: 1px solid #e3e7ef; border-radius: 12px;
            padding: 24px 26px; }
    footer { text-align: center; color: #8a93a6; font-size: 12px; margin: 30px 0; }
  </style>
</head>
<body>
  <header>
    <div class="badge">OP</div>
    <div>
      <div style="font-size:18px; font-weight:600;">On Point Finance</div>
      <div class="sub">On Point Educational Centre &middot; Quality Beyond Measure</div>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>On Point Educational Centre &middot; Quality Beyond Measure</footer>
</body>
</html>
